name: Deploy to Codeberg Pages
on:
  push:
    branches: [main]
    paths: ['site_src/**', 'website/**']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: codeberg-tiny
    container:
      image: alpine:edge
    steps:
      - name: Install prerequisites
        run: |
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/testing" >> /etc/apk/repositories
          apk update
          apk add --no-cache nodejs make lowdown
          apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/testing sblg

      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build site
        working-directory: website
        run: make install PAGES_SRC_DIR=site_src

      - name: Deploy canonical (kewplayer.com)
        uses: https://codeberg.org/git-pages/action@2b24bbb7ff943d3c8fe1df91326adec66daea6dd # v2.2.0
        with:
          server: codeberg.page
          site: 'https://kewplayer.com'
          token: ${{ forge.token }}
          source: pages/

      - name: Deploy www.kewplayer.com
        uses: https://codeberg.org/git-pages/action@2b24bbb7ff943d3c8fe1df91326adec66daea6dd # v2.2.0
        with:
          server: codeberg.page
          site: "https://www.kewplayer.com"
          token: ${{ forge.token }}
          source: pages/

permissions:
  contents: write
