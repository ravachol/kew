name: Deploy to Codeberg Pages
on:
  push:
    branches: [main]
    paths: ['site_src/**', 'website/**']

jobs:
  build-and-deploy:
    runs-on: codeberg-tiny
    container:
      image: node:20-alpine
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install build tools
        run: apk add --no-cache make sblg lowdown

      - name: Build site
        working-directory: website
        run: make install PAGES_SRC_DIR=../docs

      - name: Deploy to Codeberg Pages
        uses: https://codeberg.org/git-pages/action@v2
        with:
          site: 'https://${{ forge.repository_owner }}.codeberg.page/YOUR-REPO-NAME/'
          token: ${{ forge.token }}
          source: website/site/
