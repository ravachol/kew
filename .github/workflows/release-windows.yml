name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-faad2
            mingw-w64-ucrt-x86_64-taglib
            mingw-w64-ucrt-x86_64-fftw
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-chafa
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-opusfile
            mingw-w64-ucrt-x86_64-libvorbis
            mingw-w64-ucrt-x86_64-libogg
            mingw-w64-ucrt-x86_64-ntldd

      - name: Build
        shell: msys2 {0}
        run: |
          mingw32-make -j$(nproc)

      - name: Collect DLLs
        shell: msys2 {0}
        run: |
          mkdir -p kew-dist

          # Copy the binary and icon
          cp kew.exe kew-dist/
          cp kew.ico kew-dist/

          # Copy all MSYS2/UCRT64 DLLs (exclude Windows system DLLs)
          ntldd -R kew.exe \
            | grep -i msys64 \
            | awk '{print $3}' \
            | cygpath -f - \
            | xargs -I{} cp {} kew-dist/

      - name: Bundle docs
        shell: msys2 {0}
        run: |
          cp docs/0-README_WINDOWS.txt kew-dist/
          cp PRIVACY_POLICY.md           kew-dist/
          cp TERMS.md                    kew-dist/
          cp LICENSE                     kew-dist/
          cp README.md                   kew-dist/

      - name: Get version
        id: version
        shell: bash
        run: |
          echo "version=$(git describe --tags --dirty --always)" >> "$GITHUB_OUTPUT"

      - name: Create zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path kew-dist\* -DestinationPath "kew-$version-windows-x64.zip"

      - name: Upload artifact (for manual/test runs)
        uses: actions/upload-artifact@v4
        with:
          name: kew-windows-x64
          path: kew-*.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kew-*.zip
          generate_release_notes: true
